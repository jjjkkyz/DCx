    low_range = 1.1

    batch_size = 20000
    batch_size_step2 = 40000

    save_freq = 10000
    val_freq = 10000
    val_mesh_freq = 10000
    resolution = 256
    threshold = 0.01
    report_freq = 10000

    igr_weight = 0.1
    mask_weight = 0.0
    load_ckpt = none
}
evaluate {
    load_ckpt = ckpt_080000.pth
    use_vectorAdam = 1
    iter_1st = 100
    iter_2nd = 300
    iter_max = 250
    normal_step = 300
    report_freq = 100
    max_batch = 400000
    export_grad_field = 0
    laplacian_weight = 2000
    save_iter = 100
