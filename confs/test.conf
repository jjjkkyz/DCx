    warm_up_end = 20
    resolution = 256
    threshold = 0.005
    use_exist_mesh = 0
    draw_slice = 0
    is_cut = 1
    region_rate = 20
    watertight_separate = 1
    sample_batch_size = 10000000
}
model {
    udf_network {
        d_in = 3,
    	d_out = 1,
        d_hidden = 256,
        n_layers = 8,
        skip_in = [4],
        multires = 0,
        bias = 0.5,
        scale = 1.0,
        geometric_init = True,
        weight_norm = True
    }

}
