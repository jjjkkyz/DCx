general {
    recording = [
        ./,
        ./models
    ]
    
}

dir_path {
    data_dir = ./data/
    result_dir = ./result/
    ckpt_dir = ./ckpt/
    # dataset_dir = SIGA_batch_1
}

train {
    learning_rate = 0.0001
    max_iter = 40000
    max_iter_2 = 60000
    warm_up_end = 1000
    outlier = 0.002
